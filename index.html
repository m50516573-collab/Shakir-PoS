<title>Shakir Paints & Hardware — Billing</title>

<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* ══════════════ TOKENS ══════════════
   Navy #111726 / Gold #d4a94a / Ivory #f7f3ec
   One screen. One job: make a bill, scan or type, print it.
═════════════════════════════════════*/
:root{
  --navy:#111726; --navy2:#182032; --navy3:#212c45;
  --border:#283650;
  --ivory:#f7f3ec; --ivory2:#cfc7b7; --ivory3:#8b8377;
  --gold:#d4a94a; --gold2:#b3842e;
  --crimson:#d4504f; --sage:#3fae82;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--navy);color:var(--ivory);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
.mono{font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ══ LAYOUT ══ */
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:90px}

/* ══ HEADER ══ */
header{
  display:flex;align-items:center;gap:12px;
  padding:18px 18px 16px;border-bottom:1px solid var(--border);
}
header img{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--gold2);flex-shrink:0}
header h1{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;line-height:1.2}
header p{font-size:10.5px;color:var(--ivory3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

/* ══ ADD ITEM CARD ══ */
.card{margin:16px;padding:16px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--r)}
.card-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:12px}
.row{display:flex;gap:10px}
.row+.row{margin-top:10px}
.fld{flex:1;min-width:0}
.fld label{display:block;font-size:11px;color:var(--ivory3);margin-bottom:5px}
input{
  width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:9px;
  padding:11px 12px;color:var(--ivory);font-size:15px;font-family:inherit
}
input:focus{outline:none;border-color:var(--gold2)}
input::placeholder{color:#5a6378}
.qty-price{display:flex;gap:10px;margin-top:10px}
.qty-price .fld{flex:1}

.btn{
  border:none;border-radius:10px;padding:13px 16px;font-size:14.5px;font-weight:600;
  font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:transform .08s, opacity .15s;
}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0f00}
.btn-navy{background:var(--navy3);color:var(--ivory);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--ivory2);border:1px solid var(--border)}
.btn-block{width:100%}
.btn-sm{padding:9px 12px;font-size:13px}

.scan-row{display:flex;gap:10px;margin-top:12px}
.scan-row .btn{flex:1}

/* ══ BILL LIST ══ */
.bill-card{margin:0 16px 16px;background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.bill-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.bill-head .card-title{margin:0}
.bill-count{font-size:11px;color:var(--ivory3)}

.empty{padding:36px 20px;text-align:center;color:var(--ivory3);font-size:13.5px}
.empty span{display:block;font-size:30px;margin-bottom:8px;opacity:.5}

.item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-info{flex:1;min-width:0}
.item-name{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:12px;color:var(--ivory3);margin-top:2px}
.item-total{font-family:'DM Mono',monospace;font-size:14.5px;font-weight:600;color:var(--gold);flex-shrink:0}
.item-del{background:none;border:none;color:var(--crimson);font-size:18px;padding:4px 6px;cursor:pointer;flex-shrink:0;opacity:.8}
.item-del:active{opacity:1}

/* ══ TOTAL BAR (sticky bottom) ══ */
#totalbar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--navy2);border-top:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  max-width:480px;margin:0 auto;
  box-shadow:0 -8px 24px -8px rgba(0,0,0,.5);
}
.total-info{flex:1}
.total-label{font-size:10.5px;color:var(--ivory3);text-transform:uppercase;letter-spacing:.6px}
.total-amt{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold)}
#totalbar .btn{flex-shrink:0}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy3);border:1px solid var(--gold2);color:var(--ivory);
  padding:10px 18px;border-radius:30px;font-size:13.5px;
  opacity:0;transition:all .25s;pointer-events:none;z-index:400;white-space:nowrap;
  max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ SCANNER MODAL ══ */
#scanner-overlay,#preview-overlay{
  display:none;position:fixed;inset:0;background:rgba(5,8,16,.85);
  z-index:500;align-items:center;justify-content:center;padding:18px;
}
#scanner-overlay.open,#preview-overlay.open{display:flex}
.modal-box{
  background:var(--navy2);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:400px;max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px}
.modal-title{font-family:'Playfair Display',serif;font-size:15.5px;font-weight:700}
.modal-x{background:none;border:none;color:var(--ivory2);font-size:20px;cursor:pointer;padding:2px 6px}

.scan-video-wrap{position:relative;margin:0 18px;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:4/3;border:1.5px solid var(--border)}
#scanner-video{width:100%;height:100%;object-fit:cover;display:block}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:78%;height:42%;border-radius:10px;border:2.5px solid var(--gold);box-shadow:0 0 0 2000px rgba(0,0,0,.4);pointer-events:none}
.scan-line{position:absolute;left:11%;width:78%;top:30%;height:2px;background:linear-gradient(to right,transparent,var(--gold) 20%,var(--gold) 80%,transparent);box-shadow:0 0 8px var(--gold);animation:scanline 1.6s ease-in-out infinite;pointer-events:none}
@keyframes scanline{0%{top:30%}50%{top:70%}100%{top:30%}}
.scan-status{padding:14px 18px 6px;text-align:center;font-size:12.5px;color:var(--ivory2);min-height:18px}
.modal-actions{padding:14px 18px 18px}

/* ══ PRINT PREVIEW ══ */
.preview-wrap{flex:1;overflow-y:auto;padding:16px 18px;background:repeating-linear-gradient(135deg,var(--navy3) 0 14px,var(--navy2) 14px 28px)}
.receipt{
  background:#fff;color:#111;width:100%;max-width:320px;margin:0 auto;
  padding:20px 18px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.5;
  box-shadow:0 8px 28px rgba(0,0,0,.4);
}
.receipt img{width:50px;height:50px;display:block;margin:0 auto 6px;object-fit:contain}
.r-c{text-align:center}
.r-b{font-weight:700}
.r-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:2px}
.r-line{border-top:1px dashed #999;margin:10px 0}
.r-row{display:flex;justify-content:space-between;gap:8px;margin:4px 0}
.r-row .nm{flex:1;word-break:break-word}
.r-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:8px}
.r-foot{margin-top:14px;font-size:10.5px;color:#555;text-align:center}

.modal-actions-row{display:flex;gap:10px;padding:14px 18px 18px;border-top:1px solid var(--border)}
.modal-actions-row .btn{flex:1}

/* ══ PRINT ══ */
#print-area{display:none}
@media print{
  body>*:not(#print-area){display:none!important}
  #print-area{display:block!important}
  .receipt{box-shadow:none;margin:0;max-width:100%}
}
</style>

<script>
let bill = [];
let pendingBarcode = null;

// ══════════════ TOAST ══════════════
function toast(msg, ms){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), ms||2200);
}

// ══════════════ BILL LOGIC ══════════════
function addItem(){
  const name = document.getElementById('i-name').value.trim();
  const qty = parseFloat(document.getElementById('i-qty').value) || 0;
  const price = parseFloat(document.getElementById('i-price').value);

  if(!name){ toast('⚠️ Item ka naam likhein'); document.getElementById('i-name').focus(); return; }
  if(!price || price <= 0){ toast('⚠️ Price likhein'); document.getElementById('i-price').focus(); return; }
  if(qty <= 0){ toast('⚠️ Quantity theek karein'); return; }

  bill.push({ name, qty, price, total: qty * price });

  // if this item came from a barcode scan, remember it for next time
  if(pendingBarcode){
    rememberBarcode(pendingBarcode, name, price);
    pendingBarcode = null;
  }

  document.getElementById('i-name').value = '';
  document.getElementById('i-price').value = '';
  document.getElementById('i-qty').value = '1';

  renderBill();
  toast('✅ ' + name + ' add ho gaya');
  document.getElementById('i-name').focus();
}

function removeItem(idx){
  bill.splice(idx, 1);
  renderBill();
}

function clearBill(){
  if(bill.length === 0) return;
  if(confirm('Pura bill clear karna hai?')){
    bill = [];
    renderBill();
    toast('🗑 Bill clear ho gaya');
  }
}

function renderBill(){
  const list = document.getElementById('bill-list');
  const count = document.getElementById('item-count');
  count.textContent = bill.length + (bill.length===1 ? ' item' : ' items');

  if(bill.length === 0){
    list.innerHTML = '<div class="empty"><span>🧾</span>Abhi koi item add nahi hua<br>Upar se item add karein</div>';
  } else {
    list.innerHTML = bill.map((it, idx) => `
      <div class="item-row">
        <div class="item-info">
          <div class="item-name">${escapeHtml(it.name)}</div>
          <div class="item-meta">${it.qty} × Rs ${formatNum(it.price)}</div>
        </div>
        <div class="item-total mono">Rs ${formatNum(it.total)}</div>
        <button class="item-del" onclick="removeItem(${idx})">✕</button>
      </div>
    `).join('');
  }

  const total = bill.reduce((sum, it) => sum + it.total, 0);
  document.getElementById('total-amt').textContent = 'Rs ' + formatNum(total);
}

function formatNum(n){
  return n.toLocaleString('en-PK', { maximumFractionDigits: 2, minimumFractionDigits: 0 });
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════ BARCODE SCANNER (built-in browser API, no library needed) ══════════════
let scannerActive = false;
let scannerStream = null;
let scannerDevices = [];
let scannerDeviceIdx = 0;
let barcodeDetector = null;
let scanLoopHandle = null;

async function openScanner(){
  document.getElementById('scanner-overlay').classList.add('open');
  document.getElementById('scan-status').textContent = 'Camera shuru ho rahi hai…';
  document.getElementById('switch-cam-btn').style.display = 'none';
  scannerActive = true;

  if(!('BarcodeDetector' in window)){
    document.getElementById('scan-status').textContent =
      '⚠️ Yeh browser scanner support nahi karta. Chrome (latest) use karein.';
    return;
  }

  try{
    barcodeDetector = new BarcodeDetector({
      formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','codabar','itf','qr_code']
    });
  }catch(e){
    document.getElementById('scan-status').textContent = '⚠️ Scanner shuru nahi ho saka';
    return;
  }

  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    scannerDevices = devices.filter(d => d.kind === 'videoinput');
  }catch(e){ scannerDevices = []; }

  scannerDeviceIdx = 0;
  if(scannerDevices.length){
    const backIdx = scannerDevices.findIndex(d => /back|rear|environment/i.test(d.label));
    if(backIdx >= 0) scannerDeviceIdx = backIdx;
  }
  if(scannerDevices.length > 1){
    document.getElementById('switch-cam-btn').style.display = 'block';
  }
  startCamera();
}

async function startCamera(){
  stopCamera();
  const video = document.getElementById('scanner-video');
  document.getElementById('scan-status').textContent = 'Barcode ko frame ke andar laayein…';

  const constraints = scannerDevices.length
    ? { video: { deviceId: { exact: scannerDevices[scannerDeviceIdx].deviceId } } }
    : { video: { facingMode: 'environment' } };

  try{
    scannerStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = scannerStream;
    await video.play();
    scanLoop();
  }catch(e){
    document.getElementById('scan-status').textContent = '⚠️ Camera access nahi mila — permission check karein';
  }
}

async function scanLoop(){
  if(!scannerActive) return;
  const video = document.getElementById('scanner-video');
  try{
    if(video.readyState >= 2){
      const codes = await barcodeDetector.detect(video);
      if(codes.length > 0){
        handleScan(codes[0].rawValue);
        return;
      }
    }
  }catch(e){ /* keep trying */ }
  scanLoopHandle = requestAnimationFrame(scanLoop);
}

function switchCamera(){
  if(!scannerDevices.length) return;
  scannerDeviceIdx = (scannerDeviceIdx + 1) % scannerDevices.length;
  startCamera();
}

function stopCamera(){
  if(scanLoopHandle){ cancelAnimationFrame(scanLoopHandle); scanLoopHandle = null; }
  if(scannerStream){
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
}

function closeScanner(){
  scannerActive = false;
  stopCamera();
  document.getElementById('scanner-overlay').classList.remove('open');
}

// ══════════════ BARCODE MEMORY (remembers name+price per barcode, offline) ══════════════
function loadBarcodeMemory(){
  try{
    return JSON.parse(localStorage.getItem('shakirBarcodeMemory') || '{}');
  }catch(e){ return {}; }
}
function saveBarcodeMemory(map){
  try{ localStorage.setItem('shakirBarcodeMemory', JSON.stringify(map)); }catch(e){}
}
function rememberBarcode(code, name, price){
  if(!code) return;
  const map = loadBarcodeMemory();
  map[code] = { name, price };
  saveBarcodeMemory(map);
}
function lookupBarcode(code){
  const map = loadBarcodeMemory();
  return map[code] || null;
}

function handleScan(code){
  scannerActive = false;
  stopCamera();
  closeScanner();

  const known = lookupBarcode(code);
  if(known){
    // already known item — fill everything in, ready to add with one tap
    document.getElementById('i-name').value = known.name;
    document.getElementById('i-price').value = known.price;
    document.getElementById('i-qty').value = '1';
    pendingBarcode = code;
    toast('✅ ' + known.name + ' mil gaya — qty check karein aur Add karein', 2800);
    document.getElementById('i-qty').focus();
    document.getElementById('i-qty').select();
  } else {
    // new barcode — shopkeeper types name+price once, it gets remembered
    document.getElementById('i-name').value = '';
    document.getElementById('i-price').value = '';
    document.getElementById('i-qty').value = '1';
    pendingBarcode = code;
    toast('📷 Naya item — naam aur price likhein (yaad ho jayega)', 3000);
    document.getElementById('i-name').focus();
  }
}

  if(bill.length === 0){ toast('⚠️ Pehle koi item add karein'); return; }
  document.getElementById('preview-receipt').innerHTML = buildReceiptHtml();
  document.getElementById('preview-overlay').classList.add('open');
}

function closePreview(){
  document.getElementById('preview-overlay').classList.remove('open');
}

function doPrint(){
  document.getElementById('print-receipt').innerHTML = buildReceiptHtml();
  document.getElementById('print-area').style.display = 'block';
  window.print();
  document.getElementById('print-area').style.display = 'none';
  closePreview();
}

// ══════════════ BLUETOOTH THERMAL PRINTER (ESC/POS) ══════════════
let btPrinterDevice = null;
let btPrinterChar = null;

async function printViaBluetooth(){
  if(!navigator.bluetooth){
    toast('⚠️ Yeh browser Bluetooth printing support nahi karta (Chrome use karein)', 3500);
    return;
  }
  try{
    if(!btPrinterChar){
      toast('🔵 Printer dhoond rahe hain…', 2000);
      btPrinterDevice = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb','0000ff00-0000-1000-8000-00805f9b34fb','0000fff0-0000-1000-8000-00805f9b34fb']
      });
      const server = await btPrinterDevice.gatt.connect();
      const services = await server.getPrimaryServices();
      for(const service of services){
        const chars = await service.getCharacteristics();
        const writable = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
        if(writable){ btPrinterChar = writable; break; }
      }
      if(!btPrinterChar){
        toast('⚠️ Printer mila lekin print channel nahi mila', 3000);
        return;
      }
    }
    const escpos = buildEscPosReceipt();
    const chunkSize = 180;
    for(let i=0; i<escpos.length; i+=chunkSize){
      await btPrinterChar.writeValue(escpos.slice(i, i+chunkSize));
    }
    toast('✅ Printer ko bheja gaya');
    closePreview();
  }catch(e){
    toast('⚠️ Printer connect nahi ho saka: ' + (e.message||'try again'), 3500);
  }
}

function buildEscPosReceipt(){
  const enc = new TextEncoder();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB');
  const timeStr = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  const total = bill.reduce((sum, it) => sum + it.total, 0);
  const ESC = 0x1B, GS = 0x1D;

  let lines = [];
  lines.push([ESC,0x40]); // init
  lines.push([ESC,0x61,1]); // center align
  lines.push(Array.from(enc.encode("Shakir Paints & Hardware\n")));
  lines.push([ESC,0x61,1]);
  lines.push(Array.from(enc.encode(dateStr+" "+timeStr+"\n")));
  lines.push(Array.from(enc.encode("--------------------------------\n")));
  lines.push([ESC,0x61,0]); // left align
  bill.forEach(it => {
    lines.push(Array.from(enc.encode(it.name+"\n")));
    const left = `${it.qty} x Rs ${formatNum(it.price)}`;
    const right = `Rs ${formatNum(it.total)}`;
    const pad = Math.max(1, 32-left.length-right.length);
    lines.push(Array.from(enc.encode(left+" ".repeat(pad)+right+"\n")));
  });
  lines.push(Array.from(enc.encode("--------------------------------\n")));
  lines.push([ESC,0x21,0x10]); // bold/double-height-ish on some printers
  lines.push(Array.from(enc.encode("TOTAL: Rs "+formatNum(total)+"\n")));
  lines.push([ESC,0x21,0x00]);
  lines.push([ESC,0x61,1]);
  lines.push(Array.from(enc.encode("\nShukriya!\n\n\n")));
  lines.push([GS,0x56,0x41,0x10]); // partial cut (works on many models)

  const flat = lines.flat();
  return new Uint8Array(flat);
}
